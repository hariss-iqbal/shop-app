<div class="flex align-items-center justify-content-center min-h-screen surface-ground p-3">
  <p-card styleClass="w-full max-w-30rem shadow-4">
    <div class="text-center">
      <div class="access-denied-icon mb-4">
        <i class="pi pi-clock text-6xl text-orange-500"></i>
      </div>

      <h1 class="text-3xl font-bold text-900 mb-3">Account Pending Approval</h1>

      <div class="surface-100 border-round p-3 mb-4 text-left">
        <p class="text-700 m-0 line-height-3">
          <i class="pi pi-info-circle mr-2 text-primary"></i>
          Your account has been created. An administrator will review and approve your access.
        </p>
      </div>

      <p class="text-600 mb-4">
        You will be able to log in once your account is approved.
      </p>

      <div class="flex flex-column gap-2">
        <p-button
          label="Go to Login"
          icon="pi pi-sign-in"
          styleClass="w-full"
          (onClick)="navigateToLogin()"
        />
        <p-button
          label="Go to Home"
          icon="pi pi-home"
          severity="secondary"
          styleClass="w-full"
          (onClick)="navigateToHome()"
        />
      </div>
    </div>
  </p-card>
</div>
